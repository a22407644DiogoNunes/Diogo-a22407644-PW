{% extends "portfolio/base.html" %}

{% block content %}
<h2>Competências</h2>

<section class="lista">
    {% for c in competencia %}
    <article class="card">
        <header>
            <h3>{{ c.nome }}</h3>
        </header>

        <section>
            <p>{{ c.descricao }}</p>
        </section>
    </article>
    {% endfor %}
</section>
{% endblock %}
